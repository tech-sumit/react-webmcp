name: vrm-train-sft

on:
  workflow_dispatch:
    inputs:
      data_version:
        description: "Data version tag (must already exist on HF Hub)"
        required: true
        type: string
      run_name:
        description: "Run name (e.g. sft-2026-05-03)"
        required: true
        type: string
      mode:
        description: "Training mode"
        required: true
        type: choice
        options: [full, lora]
        default: full

concurrency:
  group: vrm-train-sft-${{ inputs.run_name }}
  cancel-in-progress: false

defaults:
  run:
    working-directory: projects/VRM-model

jobs:
  launch-pod:
    name: launch SFT pod on RunPod
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.10.4"
          enable-cache: true
          cache-dependency-glob: "projects/VRM-model/uv.lock"
      - run: uv python install 3.11
      - run: uv sync --extra dev

      - name: Launch RunPod SFT pod
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_ORG: ${{ vars.HF_ORG }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          WANDB_PROJECT: ${{ vars.WANDB_PROJECT }}
          WANDB_ENTITY: ${{ vars.WANDB_ENTITY }}
          SLACK_WEBHOOK_VRM: ${{ secrets.SLACK_WEBHOOK_VRM }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN_FOR_DISPATCH: ${{ secrets.GH_TOKEN_FOR_DISPATCH }}
          VRM_TRAIN_IMAGE: ${{ vars.VRM_TRAIN_IMAGE }}
          VRM_NETWORK_VOLUME_ID: ${{ vars.VRM_NETWORK_VOLUME_ID }}
          VRM_REGION: ${{ vars.VRM_REGION }}
          VRM_GPU_TYPE_TRAIN: ${{ vars.VRM_GPU_TYPE_TRAIN }}
          VRM_GPU_COUNT_TRAIN: ${{ vars.VRM_GPU_COUNT_TRAIN }}
          VRM_MAX_USD_SFT: ${{ vars.VRM_MAX_USD_SFT }}
          VRM_GIT_REPO: https://github.com/${{ github.repository }}.git
          VRM_GIT_REF: ${{ github.sha }}
        id: launch
        run: |
          CFG=configs/stage1_sft_${{ inputs.mode }}.yaml
          POD_ID=$(uv run vrm runpod launch-train \
              --stage sft \
              --config "$CFG" \
              --data-version "${{ inputs.data_version }}" \
              --run-name "${{ inputs.run_name }}")
          echo "pod_id=$POD_ID" >> $GITHUB_OUTPUT
      - name: Summary
        if: always()
        run: |
          {
            echo "## VRM Stage 1 SFT launched"
            echo "- pod: \`${{ steps.launch.outputs.pod_id }}\`"
            echo "- run: \`${{ inputs.run_name }}\`"
            echo "- data: \`${{ inputs.data_version }}\` (mode: ${{ inputs.mode }})"
            echo "- expected duration: 18-30h"
            echo "- monitor: https://www.runpod.io/console/pods/${{ steps.launch.outputs.pod_id }}"
            echo "- W&B: https://wandb.ai/${{ vars.WANDB_ENTITY }}/${{ vars.WANDB_PROJECT }}/runs/${{ inputs.run_name }}"
          } >> $GITHUB_STEP_SUMMARY
