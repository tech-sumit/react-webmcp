# =============================================================================
# HAProxy -- Round-robin TCP load balancer across Gluetun VPN proxy pool
#
# Each gluetun container runs an HTTP CONNECT proxy on :8888.
# HAProxy distributes incoming connections across all healthy backends
# in round-robin order, giving each request a different exit IP.
# =============================================================================

global
    log stdout format raw local0

defaults
    mode tcp
    timeout connect 5s
    timeout client  60s
    timeout server  60s
    retries 3

frontend vpn_proxy
    bind *:8888
    default_backend vpn_pool

backend vpn_pool
    balance roundrobin
    option tcp-check
    server gluetun-in n8n-gluetun-in:8888 check inter 10s fall 3 rise 2
    server gluetun-sg n8n-gluetun-sg:8888 check inter 10s fall 3 rise 2
    server gluetun-de n8n-gluetun-de:8888 check inter 10s fall 3 rise 2
    server gluetun-us n8n-gluetun-us:8888 check inter 10s fall 3 rise 2
    server gluetun-jp n8n-gluetun-jp:8888 check inter 10s fall 3 rise 2
