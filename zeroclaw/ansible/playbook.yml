---
- name: Install ZeroClaw with Docker and UFW firewall
  hosts: localhost
  connection: local
  become: true

  vars:
    ansible_python_interpreter: /usr/bin/python3

  environment:
    TERM: xterm-256color
    COLORTERM: truecolor

  pre_tasks:
    - name: Enable color terminal for current session
      ansible.builtin.set_fact:
        ansible_env: "{{ ansible_env | combine({'TERM': 'xterm-256color', 'COLORTERM': 'truecolor'}) }}"

    - name: Detect operating system
      ansible.builtin.set_fact:
        is_linux: "{{ ansible_os_family == 'Debian' }}"
        is_debian: "{{ ansible_distribution in ['Debian', 'Ubuntu'] }}"

    - name: Fail on unsupported macOS
      ansible.builtin.fail:
        msg: >-
          macOS bare-metal support is not supported.
          Please use a Linux VM or container instead.
      when: ansible_os_family == 'Darwin'

    - name: Display detected OS
      ansible.builtin.debug:
        msg: |
          Detected OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          OS Family: {{ ansible_os_family }}
          Linux (Debian/Ubuntu): {{ is_debian }}

    - name: Update apt cache and upgrade all packages (Debian/Ubuntu)
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        cache_valid_time: 3600
      when: is_debian and not ci_test
      register: apt_upgrade_result

    - name: Install ACL for privilege escalation
      ansible.builtin.package:
        name: acl
        state: present
      when: is_linux

    - name: Check if running as root
      ansible.builtin.command: id -u
      register: user_id
      changed_when: false
      become: false

    - name: Set fact for root user
      ansible.builtin.set_fact:
        is_root: "{{ user_id.stdout == '0' }}"

    - name: Install Ansible collections
      ansible.builtin.command: ansible-galaxy collection install -r requirements.yml
      args:
        chdir: "{{ playbook_dir }}"
      delegate_to: localhost
      become: false
      run_once: true
      changed_when: false

  roles:
    - zeroclaw

  post_tasks:
    - name: Create one-time welcome message for zeroclaw user
      ansible.builtin.copy:
        dest: "{{ zeroclaw_home }}/.zeroclaw-welcome"
        owner: "{{ zeroclaw_user }}"
        group: "{{ zeroclaw_user }}"
        mode: '0644'
        content: |
          echo ""
          echo "=== ZeroClaw Setup ==="
          echo ""
          echo "You are: $(whoami)@$(hostname)"
          echo "ZeroClaw: $(zeroclaw --version 2>/dev/null || echo 'not found')"
          echo ""
          echo "Quick Start:"
          echo "  zeroclaw onboard        # interactive setup"
          echo "  zeroclaw status          # check health"
          echo "  zeroclaw agent -m 'hi'   # chat"
          echo "  zeroclaw doctor          # diagnostics"
          echo ""
          rm -f "$HOME/.zeroclaw-welcome" 2>/dev/null || true

    - name: Add welcome message to .bashrc
      ansible.builtin.lineinfile:
        path: "{{ zeroclaw_home }}/.bashrc"
        line: '[ -f ~/.zeroclaw-welcome ] && source ~/.zeroclaw-welcome'
        state: present
        insertafter: EOF

    - name: Notify that playbook is complete
      ansible.builtin.debug:
        msg: "ZeroClaw installation complete!"
