# TRL GRPO config -- VRM-7B spec §4.2 (DAPO settings on)
model:
  name_or_path: ${SFT_CHECKPOINT}    # set at runtime
  freeze_vision_tower: true
  freeze_multi_modal_projector: true # spec §4.2: connector frozen too
  attn_implementation: flash_attention_2
  torch_dtype: bfloat16

dataset:
  name: ${RL_DATASET}                # tech-sumit/vrm-7b-rl-${DATA_VERSION}
  split: train
  num_proc: 16

generation:
  max_new_tokens: 8192
  temperature: 1.0
  top_p: 1.0

grpo:
  num_generations: 16                # G in DAPO
  micro_batch_size: 1
  rollout_batch_size: 256
  beta_kl: 0.0                       # DAPO: drop KL
  loss_aggregation: "token-mean"     # token-level loss
  clip_lower: 0.2                    # DAPO Clip-Higher
  clip_upper: 0.28
  use_dynamic_sampling: true         # drop all-correct/all-wrong groups
  format_reward_weight: 0.1
  accuracy_reward_weight: 0.9

training:
  output_dir: ${OUTPUT_DIR}
  learning_rate: 1.0e-6
  weight_decay: 0.0
  warmup_ratio: 0.0
  gradient_accumulation_steps: 8
  per_device_train_batch_size: 1
  num_train_epochs: 1.0              # we control by max_steps
  max_steps: 4000
  logging_steps: 10
  save_steps: 200
  save_total_limit: 5
  bf16: true
  gradient_checkpointing: true
  report_to: wandb
  run_name: ${RUN_NAME}

vllm:
  enabled: true
  tensor_parallel_size: 1
  dtype: bfloat16
  gpu_memory_utilization: 0.85
