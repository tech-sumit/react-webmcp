# LLaMA-Factory Stage 3 (rejection-sampled SFT). Same structure as Stage 1
# full fine-tune, but with smaller LR + lower epoch count, fine-tuning the
# post-RL model on filtered self-generated solutions (spec §4.3).

### model
model_name_or_path: ${SFT_CHECKPOINT}   # post-RL checkpoint, set at runtime
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
freeze_vision_tower: true
freeze_multi_modal_projector: true
deepspeed: configs/ds_zero3.json

### dataset
dataset: vrm_sft
dataset_dir: ${DATA_DIR}
template: qwen2_vl
cutoff_len: 16384

### output
output_dir: ${OUTPUT_DIR}
logging_steps: 20
save_steps: 500
save_total_limit: 3
report_to: wandb
run_name: ${RUN_NAME}

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 5.0e-6
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
flash_attn: fa2
gradient_checkpointing: true
