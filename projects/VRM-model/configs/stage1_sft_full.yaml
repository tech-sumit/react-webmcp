# LLaMA-Factory Stage 1 SFT (full fine-tune) -- VRM-7B spec §4.1
# Templated fields are substituted by vrm.train.stage1_sft at run time:
#   ${OUTPUT_DIR}, ${DATA_DIR}, ${RUN_NAME}, ${HF_REPO}

### model
model_name_or_path: Qwen/Qwen2.5-VL-7B-Instruct
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
freeze_vision_tower: true
freeze_multi_modal_projector: false
deepspeed: configs/ds_zero3.json

### dataset
dataset: vrm_sft
dataset_dir: ${DATA_DIR}
template: qwen2_vl
cutoff_len: 16384
max_samples: null
overwrite_cache: false
preprocessing_num_workers: 16
mix_strategy: concat

### output
output_dir: ${OUTPUT_DIR}
logging_steps: 20
save_steps: 1000
save_total_limit: 5
plot_loss: true
overwrite_output_dir: true
report_to: wandb
run_name: ${RUN_NAME}

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 16   # effective batch 128 across 8 GPUs
learning_rate: 1.0e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
flash_attn: fa2
gradient_checkpointing: true
ddp_timeout: 180000000

### eval
val_size: 0.005
evaluation_strategy: steps
eval_steps: 1000
per_device_eval_batch_size: 1
